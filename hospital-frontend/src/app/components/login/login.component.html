<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow-lg" style="width: 420px;">
    <div class="card-body p-5">

      <div class="text-center mb-4">
        <div class="display-4 mb-2">🏥</div>
        <h2 class="fw-bold text-primary">HMS</h2>
        <p class="text-muted">Hospital Management System</p>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible" role="alert">
        {{ errorMessage }}
        <button type="button" class="btn-close" (click)="errorMessage = ''"></button>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <div class="input-group">
          <span class="input-group-text">📧</span>
          <input
            type="email"
            class="form-control"
            [(ngModel)]="email"
            placeholder="Enter your email"
            [disabled]="isLoading" />
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text">🔒</span>
          <input
            type="password"
            class="form-control"
            [(ngModel)]="password"
            placeholder="Enter your password"
            [disabled]="isLoading" />
        </div>
      </div>

      <button
        class="btn btn-primary w-100 py-2 fw-semibold"
        (click)="login()"
        [disabled]="isLoading">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>

      <hr class="my-4">

      <div class="text-center">
        <p class="text-muted mb-0">Don't have an account?
          <a routerLink="/register" class="text-primary fw-semibold text-decoration-none">
            Register as Patient
          </a>
        </p>
      </div>

    </div>
  </div>
</div>
