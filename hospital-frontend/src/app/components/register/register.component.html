<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow-lg" style="width: 440px;">
    <div class="card-body p-5">

      <div class="text-center mb-4">
        <div class="display-4 mb-2">🏥</div>
        <h2 class="fw-bold text-success">Patient Registration</h2>
        <p class="text-muted">Create your account to book appointments</p>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible" role="alert">
        {{ errorMessage }}
        <button type="button" class="btn-close" (click)="errorMessage = ''"></button>
      </div>

      <div *ngIf="successMessage" class="alert alert-success" role="alert">
        ✅ {{ successMessage }}
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Full Name</label>
        <div class="input-group">
          <span class="input-group-text">👤</span>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="name"
            placeholder="Enter your full name"
            [disabled]="isLoading" />
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <div class="input-group">
          <span class="input-group-text">📧</span>
          <input
            type="email"
            class="form-control"
            [(ngModel)]="email"
            placeholder="Enter your email"
            [disabled]="isLoading" />
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text">🔒</span>
          <input
            type="password"
            class="form-control"
            [(ngModel)]="password"
            placeholder="Minimum 6 characters"
            [disabled]="isLoading" />
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Confirm Password</label>
        <div class="input-group">
          <span class="input-group-text">🔒</span>
          <input
            type="password"
            class="form-control"
            [(ngModel)]="confirmPassword"
            placeholder="Re-enter your password"
            [disabled]="isLoading" />
        </div>
      </div>

      <button
        class="btn btn-success w-100 py-2 fw-semibold"
        (click)="register()"
        [disabled]="isLoading">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
        {{ isLoading ? 'Creating Account...' : 'Create Account' }}
      </button>

      <hr class="my-4">

      <div class="text-center">
        <p class="text-muted mb-0">Already have an account?
          <a routerLink="/login" class="text-primary fw-semibold text-decoration-none">
            Sign In
          </a>
        </p>
      </div>

    </div>
  </div>
</div>
